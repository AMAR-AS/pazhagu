name: pazhagu
description: Next-Generation Unified Communication Platform with End-to-End Encryption
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Storage & Database
  sqflite: ^2.3.3
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Networking
  http: ^1.2.1
  web_socket_channel: ^2.4.5

  # Encryption & Security
  cryptography: ^2.7.0

  # Media & Files
  image_picker: ^1.1.2
  camera: ^0.11.0+1
  video_player: ^2.8.6
  file_picker: ^8.0.5

  # Location
  geolocator: ^12.0.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

  # Firebase (optional)
  firebase_core: ^2.31.0
  firebase_messaging: ^14.9.2
  firebase_analytics: ^10.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Oxanium
      fonts:
        - asset: assets/fonts/Oxanium-Regular.ttf
        - asset: assets/fonts/Oxanium-Bold.ttf
          weight: 700
        - asset: assets/fonts/Oxanium-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Oxanium-Light.ttf
          weight: 300
